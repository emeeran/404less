spec:
  id: FEAT-003
  name: Password Reset
  version: 1.0.0
  status: draft
  author: @team-auth
  created: 2024-01-14
  updated: 2024-01-14

  description: |
    Allow users who forgot their password to reset it via email.
    Users request a reset link, receive it by email, and can set
    a new password using the token from the link.

  user_stories:
    - id: US-001
      story: |
        As a user who forgot my password,
        I want to receive a password reset link by email,
        So that I can regain access to my account.

  acceptance_criteria:
    - id: AC-001
      description: Reset email sent
      given: User requests password reset for a registered email
      when: They submit the request
      then: Reset email is sent (if email exists in system)

    - id: AC-002
      description: Password reset with valid token
      given: User has valid reset token
      when: They submit new password meeting requirements
      then: Password is updated, token invalidated, user can login

    - id: AC-003
      description: Expired token
      given: Reset token has expired (>1 hour old)
      when: User tries to use it
      then: Error shown with option to request new reset

  edge_cases:
    - id: EC-001
      scenario: Unregistered email
      expected: Show same success message (no enumeration)

    - id: EC-002
      scenario: Multiple reset requests
      expected: Invalidate previous tokens, only latest valid

    - id: EC-003
      scenario: Token already used
      expected: Show error, suggest requesting new reset

    - id: EC-004
      scenario: New password same as old
      expected: Show error "cannot reuse previous password"

  constraints:
    - id: C-001
      type: security
      description: Reset token expires in 1 hour

    - id: C-002
      type: security
      description: Token is single-use, invalidated after use

    - id: C-003
      type: security
      description: Token is crypto-random 32 bytes

    - id: C-004
      type: rate_limit
      description: Max 3 reset requests per email per hour

  api_endpoints:
    - id: API-001
      method: POST
      path: /auth/password-reset/request
      request:
        body:
          email: string (required)
      response:
        success:
          status: 200
          body:
            message: "If an account exists, a reset email has been sent"

    - id: API-002
      method: POST
      path: /auth/password-reset/confirm
      request:
        body:
          token: string (required)
          new_password: string (required, min 12 chars)
      response:
        success:
          status: 200
          body:
            message: "Password reset successfully"
        errors:
          - status: 400
            body:
              error: "invalid_token"
          - status: 400
            body:
              error: "password_reuse"

  data_models:
    - id: DM-001
      name: PasswordResetToken
      fields:
        id: UUID (primary key)
        user_id: UUID (foreign key)
        token: string (unique, indexed)
        expires_at: timestamp
        used_at: timestamp (nullable)

  dependencies:
    - FEAT-001 (User model required)

  out_of_scope:
    - SMS password reset
    - Password recovery questions

  notes:
    - Consider logging password changes for security audit

  changelog:
    - version: 1.0.0
      date: 2024-01-14
      changes: Initial draft
